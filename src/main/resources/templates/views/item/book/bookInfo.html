<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/views/common/header :: header"/>
<script>
    function reviewPage() {
        if ($("#login").val() == null || $("#login").val() == '') {
            alert("로그인 후 사용가능한 기능입니다.");
        }

        let isbn = $("#isbn").val();
        location.href = "/review/book/add/" + isbn;
    }
</script>
<body>
<input type="hidden" th:id="login" th:value="${session.get('login')}">
<div th:replace="/views/common/bodyHeader :: bodyHeader"/>
<div class="container" style="width: 80%;">
    <input type="hidden" th:id="isbn" th:value="${book.isbn}">
    <div class="row">
        <p class="h3 col-12" th:text="${book.name}"></p>
    </div>
    <hr>
    <div>
        <div class="row">
            <span class="col-6" style="padding-left: 60px;">
                <img th:src="@{${book.cover}}" width="350px;" height="523px;">
            </span>
            <span class="col-6">
                <div style="height: 8%;">
                    <span class="h4" th:text="|작가|" style="line-height: 60px;"></span>
                    &nbsp; &nbsp; &nbsp; &nbsp;
                    <span th:text="${book.author}"></span>
                </div>
                <hr>
                <div style="height: 8%;">
                    <span class="h4" th:text="|출판사|" style="line-height: 60px;"></span>
                    &nbsp; &nbsp; &nbsp; &nbsp;
                    <span th:text="${book.publisher}"></span>
                </div>
                <hr>
                <div style="height: 8%;">
                    <span class="h4" th:text="|출판일|" style="line-height: 60px;"></span>
                    &nbsp; &nbsp; &nbsp; &nbsp;
                    <span th:text="${book.pubDate}"></span>
                </div>
                <hr>
                <div style="height: 14%;">
                    <p class="h4" th:text="|책 소개|" style="line-height: 60px;"></p>
                    <p th:utext="${book.description}"></p>
                </div>
                <hr style="margin-top: 80px;">
                <div style="height: 8%;">
                    <span class="h4" th:text="|평점|" style="line-height: 60px;"></span>
                    &nbsp; &nbsp; &nbsp; &nbsp;
                    <span th:text="|${grade} 점 (${count} 명)|"></span>
                </div>
                <hr>
                <div style="height: 14%">
                    <button type="button" class="btn btn-primary w-25" style="margin-left: 35%; margin-top: 5%; height: 60%;"  th:onclick="reviewPage()" th:text="|리뷰 쓰러 가기|"></button>
                </div>
            </span>
        </div>
    </div>
</div>
<div th:replace="/views/common/fotter :: fotter"/>
</body>
</html>
