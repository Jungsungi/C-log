<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="views/common/header :: header"/>
<style>
    .book-title {
        width:100%;
        height:30px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow: ellipsis;
    }
    textarea {
        width: 100%;
        height: 100%;
        resize: none;
        border: none;
        outline: none;
        font-size: 18px;
    }
    #title {
        font-size: x-large;
        text-align: center;
    }
</style>
<script>
    $(document).ready(function() {
       $("#listBtn").on("click", function () {
           location.href = "/review/book";
       }) ;

    });
    function bookInfo() {
        location.href = "/item/book/" + $("#isbn").val();
    }
</script>
<body>
<div th:replace="/views/common/bodyHeader :: bodyHeader"/>
<div class="container" style="width: 80%;">
    <input type="hidden" th:id="isbn" th:value="${book.isbn}">
    <div class="row">
        <div class="col-12 h1" th:text="|책 리뷰 작성|"></div>
        <span class="col-4 space">
                <div>
                    <h2 class="text-center" style="width: 100%; height: 60px;" th:text="${review.title}"></h2>
                </div>
                <div class="space" style="padding-left: 25%; border: solid 1px black">
                    <img th:src="${book.cover}" width="300px" height="400px;" onclick="bookInfo()">
                </div>
                <div class="space">
                    <span class="h5" th:text="|작성자|"></span> &nbsp; &nbsp; &nbsp; &nbsp;
                    <span class="h5" th:text="${review.member.userName}"></span>
                </div>
                <hr>
                <div class="space">
                    <div>
                        <span class="h5" th:text="|평점|"></span> &nbsp; &nbsp; &nbsp; &nbsp;
                        <span style="margin: 0 auto">
                            <label class="btn btn-outline-info mx-2 grade" th:text="${review.grade}"></label>
                        </span>
                    </div>
                    <hr>
                    <div class="book-title">
                        <span class="h5" th:text="|제목|"></span> &nbsp; &nbsp; &nbsp; &nbsp;
                        <span class="h5" th:text="${book.name}"></span>
                    </div>
                    <hr>
                    <div>
                        <span class="h5" th:text="|작가|"></span> &nbsp; &nbsp; &nbsp; &nbsp;
                        <span class="h5" th:text="${book.author}"></span>
                    </div>
                    <hr>
                    <div>
                        <span class="h5" th:text="|출판일|"></span> &nbsp; &nbsp;
                        <span class="h5" th:text="${book.pubDate}"></span>
                    </div>
                    <hr>
                    <div>
                        <span class="h5" th:text="|출판사|"></span> &nbsp; &nbsp;
                        <span class="h5" th:text="${book.publisher}"></span>
                    </div>
                    <hr>
                </div>
            </span>
        <span class="col-8 space">
                <div style="border: solid 1px black; height: 100%;">
                    <textarea th:id="content" th:name="content" th:text="${review.content}"></textarea>
                </div>
        </span>
    </div>
    <div class="space col-12 btn-group">
        <span>
            <button type="button" th:text="|목록으로|" th:id="listBtn" class="btn btn-info text-white" style="width: 200px; height: 60px; margin:0 43%"></button>
        </span>
        <span th:if="${session.get('login') != null}" class="mx-2">
            <button th:if="${review.member.userName eq session.get('login').userName}" type="button" th:text="|리뷰 수정|" class="btn btn-info text-white" style="width: 200px; height: 60px; margin:0 43%"></button>
        </span>
    </div>

</div>
<div th:replace="/views/common/fotter :: fotter"/>
</body>
</html>
