<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/views/common/header :: header"/>
<script>
    function reviewPage() {
        let isbn = $("#isbn").val();
        location.href = "/review/book/add/" + isbn;
    }
</script>
<body>
<div th:replace="/views/common/bodyHeader :: bodyHeader"/>
<div class="container" style="width: 80%;">
    <input type="hidden" th:id="isbn" th:value="${book.isbn}">
    <div class="row">
        <p class="h3 col-12" th:text="${book.name}"></p>
    </div>
    <hr>
    <div>
        <div class="row">
            <span class="col-6" style="padding-left: 60px;">
                <img th:src="@{${book.cover}}" width="500px;" height="750px;">
            </span>
            <span class="col-6">
                <div style="height: 14%;">
                    <p class="h4" th:text="|작가|" style="line-height: 60px;"></p>
                    <p th:text="${book.author}"></p>
                </div>
                <hr>
                <div style="height: 14%;">
                    <p class="h4" th:text="|출판사|" style="line-height: 60px;"></p>
                    <p th:text="${book.publisher}"></p>
                </div>
                <hr>
                <div style="height: 14%;">
                    <p class="h4" th:text="|출판일|" style="line-height: 60px;"></p>
                    <p th:text="${book.pubDate}"></p>
                </div>
                <hr>
                <div style="height: 14%;">
                    <p class="h4" th:text="|책 소개|" style="line-height: 60px;"></p>
                    <p th:text="${book.description}"></p>
                </div>
                <hr style="margin-top: 80px;">
                <div style="height: 14%;">
                    <p class="h4" th:text="|평점|" style="line-height: 60px;"></p>
                    <p th:text="|${grade} 점 (${count} 명)|"></p>
                </div>
                <div>
                    <button type="button" class="btn btn-primary" th:onclick="reviewPage()" th:text="|리뷰 쓰러 가기|"></button>
                </div>
            </span>
        </div>
    </div>
</div>
<div th:replace="/views/common/fotter :: fotter"/>
</body>
</html>
