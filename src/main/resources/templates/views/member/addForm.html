<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="/views/common/header :: header" />
<style>
    .addForm {
        width: 600px;
        height: 100%;
        box-shadow: 0 0 10px;
        margin: 0 auto;
        padding: 30px;
    }

    .idChk {
        position: absolute;
        bottom: 0px;
        height: 37px;
        left: 423px;
    }

    .pwd-success {
        color: #0a53be;
    }

    .pwd-failed {
        color: red;
    }

    .gender-btn {
        border: solid 1px royalblue;
    }

    .active {
        background-color: royalblue;
    }
</style>
<script>

    $(document).ready(function () {
        init();

       $("#pwdCheck").on("blur", function () {
           let pwd = $("#pwd").val();
           if ($(this).val() != pwd) {
               $("#pwdCheckResult").text("비밀번호가 일치하지 않습니다.");
               $("#pwdCheckResult").removeClass("pwd-success");
               $("#pwdCheckResult").addClass("pwd-failed");
           } else {
               $("#pwdCheckResult").text("비밀번호가 일치합니다.");
               $("#pwdCheckResult").removeClass("pwd-failed");
               $("#pwdCheckResult").addClass("pwd-success");
           }
       });

       $(".gender-btn").on("click", function () {
          $(".gender-btn").each(function () {
              $(this).removeClass("active")
          })

           $(this).addClass("active")
       });
    });

    function init() {
        $(".gender_input").each(function () {
            let flag = $(this).is(":checked");
            if (flag) {
                let id = $(this).attr("id");
                $("#" + id + "Btn").addClass("active");
            }
        });
    }

    let usefullId = false;
    function idDuplicatedCheck() {
        let id = $("#userName").val();

        //240711 sungiJung url 주소 수정
        $.ajax({
            url : "/member/check",
            data : {id},
            type : "post",
            success : function (data) {
                if (data == 0) {
                    alert("사용가능한 아이디입니다.")
                    usefullId = true;
                } else {
                    alert("중복된 아이디입니다.")
                    usefullId = false;
                }
            }
        })
    }

    function memberSubmit() {
        if (! usefullId) {
            alert("아이디 중복 확인을 먼저 진행해 주세요.")
            return;
        }

        if ($("#pwdCheckResult").hasClass("pwd-failed")) {
            alert("비밀번호와 비밀번호 확인이 일치하지 않습니다.")
            return;
        }

        $("form").submit();
    }
</script>
<body>
<div th:replace="/views/common/bodyHeader :: bodyHeader"/>
<div class="container" style="width: 60%;">
    <div class="addForm form-floating row">
        <h1 class="col-12" th:text="|회원 가입|" style="text-align: center"></h1>
        <form method="post" th:object="${form}">
            <div class="space col-12 row" style="position: relative">
                <p class="h3 col-12"><label th:text="|아이디|" for="userName" class="form-label"></label></p>

                <input type="text" id="userName" class="form-control col-12" th:field="*{userName}" th:errorclass="fieldError" th:placeholder="|아이디를 입력해주세요.|"/>
                <button type="button" id="duplicateChk" onclick="idDuplicatedCheck();" class="idChk btn btn-primary" style="width: 93px;" th:text="|중복 확인|"></button>
                <p th:if="${#fields.hasErrors('userName')}"  th:errorclass="errorText" th:errors="*{userName}"></p>

            </div>
            <div class="space col-12 row">
                <p class="h3 col-12"><label th:text="|비밀번호|" for="pwd"></label></p>
                <input type="password" id="pwd" class="form-control col-12"  th:errorclass="fieldError" th:field="*{pwd}" th:placeholder="|비밀번호를 입력해주세요.|"/>
                <p th:if="${#fields.hasErrors('pwd')}"  th:errorclass="errorText" th:errors="*{pwd}"></p>
            </div>
            <div class="space col-12 row">
                <p class="h3 col-12"><label th:text="|비밀번호 확인|" for="pwdCheck"></label></p>
                <input type="password" id="pwdCheck"  class="form-control col-12" th:field="*{pwdCheck}" th:placeholder="|비밀번호를 다시 입력해주세요.|"/>
                <p id="pwdCheckResult" class="col-12"></p>
            </div>
            <div class="col-12 row">
                <p class="h3 col-12"><label th:text="|이름|" for="name"></label></p>
                <input type="text" id="name"  th:errorclass="fieldError" class="form-control col-12" th:field="*{name}" th:placeholder="|이름을 입력해주세요.|"/>
                <p th:if="${#fields.hasErrors('name')}"  th:errorclass="errorText" th:errors="*{name}"></p>
            </div>
            <div class="col-12 row space">
                <p class="h3 col-12" th:text="성별"></p>
                <span class="col-12">
                    <button type="button" id="mailBtn" class="btn gender-btn"><label for="male" th:text="|남성|"></label></button>
                    <input type="radio" class="d-none gender_input" th:field="*{gender}" id="male" value="M">
                    <button type="button" id="femaleBtn" class="btn gender-btn"><label for="female" th:text="|여성|"></label></button>
                    <input type="radio" class="d-none gender_input" th:field="*{gender}" id="female" value="W">
                    </span>
                <p th:if="${#fields.hasErrors('gender')}"  th:errorclass="errorText" th:errors="*{gender}"></p>
            </div>
            <div class="space col-12 row">
                <p class="h3 col-12"><label th:text="|email|" for="email"></label></p>
                <input type="email" id="email"  th:errorclass="fieldError" class="form-control col-12" th:field="*{email}" th:placeholder="|sungi1205@naver.com|"/>
                <p th:if="${#fields.hasErrors('email')}"  th:errorclass="errorText" th:errors="*{email}"></p>
            </div>
            <div class="space col-12 row" style="margin-bottom: 50px;">
                <p class="h3 col-12"><label th:text="|전화번호|" for="phone_first"></label></p>
                <span class="mt-3 col-12">
                    <input type="tel" id="phone_first" class="form-control" style="width: 30%; float: left" th:field="*{phoneFirst}" th:placeholder="|010|"/>
                    <h5 style="float: left; line-height: 30px">&nbsp;-&nbsp;</h5>
                    <input type="tel" id="phone_middle" class="form-control" style="width: 30%; float: left" th:field="*{phoneMiddle}" th:placeholder="1234"/>
                    <h5 style="float:left; line-height: 30px;">&nbsp;-&nbsp;</h5>
                    <input type="tel" id="phone_last" class="form-control" style="width: 30%; float:left;" th:field="*{phoneLast}" th:placeholder="5678"/>
                </span>
            </div>
            <div class="col-12" style="width: 100%; margin-left: 30%;">
                <button type="button" onclick="memberSubmit()" class="btn-primary btn" style="width: 40%; height: 40px;" th:text="|회원가입|"></button>
            </div>
        </form>
    </div>
</div>
<div th:replace="/views/common/fotter :: fotter"/>
</body>
</html>
